name: Employee Portal CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BackEnd

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run test --if-present

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

  docker-build:

    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build -t employee-backend ./BackEnd

      - name: Build Frontend Image
        run: |
          docker build -t employee-frontend ./Frontend


  trivy-scan:
    runs-on: ubuntu-latest

    needs:
      - docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t employee-backend ./BackEnd

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: employee-backend
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  push-image:

    runs-on: ubuntu-latest

    needs:
      - trivy-scan

    permissions:
      packages: write
      contents: read

    steps:

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/employee-backend:latest \
          ./BackEnd

      - name: Push Backend Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/employee-backend:latest

      - name: Build Frontend Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/employee-frontend:latest \
          ./Frontend

      - name: Push Frontend Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/employee-frontend:latest