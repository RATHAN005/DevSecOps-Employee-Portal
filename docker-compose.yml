services:

  mongodb:
    image: mongo:8
    container_name: hrms-mongodb

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    networks:
      - hrms-network

  backend:
    build:
      context: ./backend

    container_name: hrms-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/hrms
      JWT_SECRET: dev-secret

    depends_on:
      - mongodb

    networks:
      - hrms-network

  frontend:
    build:
      context: ./frontend

    container_name: hrms-frontend

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - hrms-network

networks:
  hrms-network:

volumes:
  mongodb_data: