apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: employee-portal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: ghcr.io/rathan005/employee-backend:latest

          env:
            - name: MONGODB_URI
              value: mongodb://mongodb-service:27017/hrms

          ports:
            - containerPort: 5000

          imagePullPolicy: Always